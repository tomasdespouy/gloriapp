name: CI - GlorIA

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  # Dummy env vars for build (real ones are in Vercel)
  NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
  SUPABASE_SERVICE_ROLE_KEY: dummy-service-key

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Type check & Build
        run: npm run build

      - name: Check bundle size
        run: |
          echo "Build output size:"
          du -sh .next/ || true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for exposed secrets
        run: |
          echo "Checking for exposed secrets in source..."
          ! grep -r "sk-proj-\|sbp_\|eyJhbG" src/ --include="*.ts" --include="*.tsx" || echo "WARNING: Possible secrets in source code!"
          echo "Checking for tracked env files (excluding .example templates)..."
          TRACKED_ENV=$(git ls-files -- ':(glob)**/.env' ':(glob)**/.env.local' ':(glob)**/.env.production' ':(glob)**/.env.development' ':(exclude)**/.env.example' ':(exclude)**/.env.local.example')
          if [ -n "$TRACKED_ENV" ]; then
            echo "ERROR: The following .env files are tracked in git and must be removed:"
            echo "$TRACKED_ENV"
            exit 1
          fi
          echo "OK: no .env files tracked."

      - name: Setup Python (for Semgrep)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep static analysis
        run: semgrep --config .semgrep.yml --error
